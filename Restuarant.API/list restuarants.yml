info:
  name: list restuarants
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/api/restuarant?api-version={{api-version}}&page=1&pageSize=25"
  params:
    - name: api-version
      value: "{{api-version}}"
      type: query
    - name: page
      value: "1"
      type: query
    - name: pageSize
      value: "25"
      type: query
    - name: name
      value: pizza
      type: query
      disabled: true
    - name: name
      value: cookie
      type: query
      disabled: true
    - name: cuisine
      value: pizza
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
